[INPUT]
macda_file = /home/zy/WRF/DATA/macda-mro-mcs/mro-mcs-reanalysis_mars_MY28SOY507_MY28SOY537_v2-0.nc

# Start with one time frame for smoke testing. Set max_times empty, or pass
# --max-times, when the metgrid path is verified.
start_index = 0
end_index =
max_times = 1

[OUTPUT]
output_root = output
output_prefix = MACDA
variable_table = db/MACDA-v2_CORE.csv
map_source = MACDA

# Native MACDA horizontal grid after longitude normalization.
lat_start = -87.5
lat_end = 87.5
nlat = 36
lon_start = 0.0
lon_end = 355.0
nlon = 72
lon_convention = 0_360

# Mars radius in km for WRF intermediate IPROJ=0.
mars_radius_km = 3389.92

# Pressure levels in Pa. These are Mars pressures, not Earth hPa.
plev_pa = 700,610,500,400,300,200,150,100,70,50,30,20,10,5,2,1,0.5,0.2,0.1

# Convert +00YY-MM-DDThh:mm:ssA to MarsWRF YYYY-DDDDD_HH:MM:SS.
hdate_strategy = marswrf_sol
emit_optional_fields = true
xfcst_from_start = true

[MARS]
gravity = 3.72
tau_reference_pressure_pa = 700.0
validate_time_alignment = true
time_tolerance_seconds = 1.0